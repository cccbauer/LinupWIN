name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "flet>=0.25.0"
          pip install --upgrade "rich>=13.7"

      - name: Build Windows EXE
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
          WT_SESSION: "githubactions"
          TERM: "xterm-256color"
        run: echo y | flet build windows --no-rich-output
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LinupWIN-windows
          path: build/windows/
          retention-days: 30

      - name: Zip for release
        if: startsWith(github.ref, 'refs/tags/')
        run: Compress-Archive -Path build\windows\* -DestinationPath LinupWIN-${{ github.ref_name }}-windows.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: LinupWIN-${{ github.ref_name }}-windows.zip
          name: Linup ${{ github.ref_name }}
          body: |
            ## Linup ${{ github.ref_name }} — Windows
            1. Download and extract the zip
            2. Run `linup.exe`
            No Python or Flutter required.
