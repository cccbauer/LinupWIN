name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'          # triggers on: git tag v11.5 && git push --tags
  workflow_dispatch:  # allows manual trigger from GitHub Actions UI

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "flet>=0.25.0"

      - name: Enable Flutter Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Build Windows EXE
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: flet build windows --no-rich-output

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: LinupWIN-windows
          path: build/windows/
          retention-days: 30

      # Creates a GitHub Release with the .exe when triggered by a tag
      - name: Zip build output
        if: startsWith(github.ref, 'refs/tags/')
        run: Compress-Archive -Path build\windows\* -DestinationPath LinupWIN-${{ github.ref_name }}-windows.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: LinupWIN-${{ github.ref_name }}-windows.zip
          name: Linup ${{ github.ref_name }}
          body: |
            ## Linup ${{ github.ref_name }} — Windows

            ### Install
            1. Download `LinupWIN-${{ github.ref_name }}-windows.zip`
            2. Extract the zip
            3. Run `linup.exe`

            No Python or Flutter required.
