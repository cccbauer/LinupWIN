name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'          # triggers on: git tag v11.5 && git push --tags
  workflow_dispatch:  # allows manual trigger from GitHub Actions UI

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "flet>=0.25.0"
          pip install --upgrade "rich>=13.7"

      - name: Build Windows EXE
        shell: pwsh
        env:
          PYTHONUTF8: "1"
          PYTHONIOENCODING: "utf-8"
        run: |
          # Enable VT processing on stdout so rich uses ANSI instead of Win32 API
          $kernel32 = Add-Type -Name 'Kernel32VT' -Namespace '' -PassThru -MemberDefinition @'
          [DllImport("kernel32.dll")] public static extern IntPtr GetStdHandle(int h);
          [DllImport("kernel32.dll")] public static extern bool GetConsoleMode(IntPtr h, out int m);
          [DllImport("kernel32.dll")] public static extern bool SetConsoleMode(IntPtr h, int m);
'@
          $h = $kernel32::GetStdHandle(-11)
          $m = 0
          [void]$kernel32::GetConsoleMode($h, [ref]$m)
          [void]$kernel32::SetConsoleMode($h, $m -bor 0x0004)
          echo y | flet build windows --no-rich-output

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: LinupWIN-windows
          path: build/windows/
          retention-days: 30

      # Creates a GitHub Release with the .exe when triggered by a tag
      - name: Zip build output
        if: startsWith(github.ref, 'refs/tags/')
        run: Compress-Archive -Path build\windows\* -DestinationPath LinupWIN-${{ github.ref_name }}-windows.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: LinupWIN-${{ github.ref_name }}-windows.zip
          name: Linup ${{ github.ref_name }}
          body: |
            ## Linup ${{ github.ref_name }} — Windows

            ### Install
            1. Download `LinupWIN-${{ github.ref_name }}-windows.zip`
            2. Extract the zip
            3. Run `linup.exe`

            No Python or Flutter required.
